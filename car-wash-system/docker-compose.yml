version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80" # Chạy frontend trên cổng 8080 theo yêu cầu
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=secret
      - DB_NAME=carwash
      - PORT=3000
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=carwash
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: